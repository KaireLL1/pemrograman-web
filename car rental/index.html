<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>SEWA MOBIL MURAH MERIAH- KAI</h1>
            <p>Sewa sini aja RAFI AHMaD pernah sewa di sini</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="./lambo.jpg" alt="car 1">
            <h3>Lambo</h3>
            <p>10 jt perjam</p>
        </div>
        <div class="car-item">
            <img src="./car 2.jpg" alt="car 2">
            <h3>si Ganteng</h3>
            <p>20 jt perjam</p>
        </div>
        <div class="car-item">
            <img src="./car 3.jpg" alt="car 3">
            <h3>Si cepat</h3>
            <p>1m perjam</p>
        </div>
        <div class="car-item">
            <img src="./car 4.jpg" alt="car 4">
            <h3>Ambatukam</h3>
            <p>1 jt perjam</p>
        </div>
    </div>
</body>

</html>
